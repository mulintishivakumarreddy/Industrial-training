<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#333;
color:white;
}

nav a{
margin:10px;
text-decoration:none;
color:white;
}

button{
padding:8px 15px;
border:none;
background:orange;
color:white;
cursor:pointer;
}

/* HERO */

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:#f5f5f5;
}

/* FOOTER */

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
}

footer a{
color:white;
margin:10px;
text-decoration:none;
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

function Header(){
return(
<header>

<div className="logo">MyWebsite</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

<button>Login</button>

</header>
)
}

function Hero(){
return(
<div className="hero">
<h1>Welcome to My Website</h1>
<p>Learn Web Development Easily</p>
<button>Get Started</button>
</div>
)
}

function Footer(){
return(
<footer>
<p>© 2026 MyWebsite</p>

<div>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>

</footer>
)
}

var main =
<div>
{Header()}
{Hero()}
{Footer()}
</div>

ReactDOM.render(main,document.getElementById("root"))

</script>

</body>
</html>
