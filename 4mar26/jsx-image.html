<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>



</head>
<body>

    <div id="root"></div>
 
 <script type="text/babel">
    var i=0;
var images=[{
    imgUrl:"https://ntvb.tmsimg.com/assets/assets/509523_v9_bb.jpg",
    likes:0
},
    {
    imgUrl: "https://upload.wikimedia.org/wikipedia/commons/d/d3/Deepika_Padukone_2025_%281%29.png",
    likes: 0
            },
            {
                imgUrl: "https://th-i.thgim.com/public/incoming/ifvdkf/article69668381.ece/alternates/FREE_1200/Actor%20Deepika%20Padukone%208.jpg",
                likes: 0
            },
        ]
        function nextImg(){
           if(i===images.length-1){
                i=-1
            }
            i++;
            genUI()
        }
         function Likeimg(){
        images[i].likes++
            genUI()
        }
function genUI() {
    var gallary=<div>
       <img src={images[i].imgUrl} alt="image vasthundi" width="300px"/>
       <br/>
       <b id="likes">({images[i].likes})</b>
       <br/>
    <button onClick={()=>{Likeimg()}}>Like</button>
    <button onClick={()=>{nextImg()}}>Next</button></div>
    ReactDOM.render(gallary,document.getElementById("root"))
}
genUI()
</script>
</body>
</html>
